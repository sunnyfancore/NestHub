version: '3'
networks:
    docker-network:
      name: docker-network
      driver: bridge
services:
  nesthub:
    build: .
    working_dir: /app
    ports:
      - "5186:8080"
    volumes:
      - ./publish:/app
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - docker-network
